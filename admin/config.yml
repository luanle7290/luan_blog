backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "images"
public_folder: "/images"

collections:
  - name: "portfolio"
    label: "冒聼聴聜 Portfolio Content"
    files:

      - name: "content"
        label: "芒聹聫茂赂聫 Edit Portfolio"
        file: "data.json"
        format: "json"
        fields:

          # 芒聰聙芒聰聙 HERO 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
          - label: "冒聼聨炉 Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Status Badge (e.g. Open to Opportunities)", name: "badge",       widget: "string" }
              - { label: "Your Full Name",                             name: "name",        widget: "string" }
              - { label: "Hero Description (1芒聙聯2 sentences)",          name: "description", widget: "text"   }
              - { label: "LinkedIn URL",                               name: "linkedin_url",widget: "string" }
              - label: "Stats (numbers shown on hero)"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Number (e.g. 7+)", name: "number", widget: "string" }
                  - { label: "Label (e.g. Years Experience)", name: "label", widget: "string" }

          # 芒聰聙芒聰聙 ABOUT 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
          - label: "冒聼聭陇 About Me"
            name: "about"
            widget: "object"
            fields:
              - label: "Bio Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "paragraph", widget: "text" }
              - label: "Skills / Tags"
                name: "skills"
                widget: "list"
                field: { label: "Skill", name: "skill", widget: "string" }

          # 芒聰聙芒聰聙 CERTIFICATIONS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
          - label: "冒聼聫聟 Certifications"
            name: "certifications"
            widget: "list"
            fields:
              - { label: "Icon (emoji)", name: "icon",  widget: "string" }
              - { label: "Certificate Name", name: "title", widget: "string" }
              - { label: "Issuing Organisation", name: "org", widget: "string" }

          # 芒聰聙芒聰聙 EXPERIENCE 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
          - label: "冒聼聮录 Work Experience"
            name: "experience"
            widget: "list"
            fields:
              - { label: "Company Name",   name: "company", widget: "string" }
              - { label: "Job Title",      name: "role",    widget: "string" }
              - { label: "Period (e.g. Jan 2022 芒聙聯 Dec 2023)", name: "period", widget: "string" }
              - { label: "Faded dot? (tick for older/minor roles)", name: "faded", widget: "boolean", default: false }
              - label: "Bullet Points"
                name: "bullets"
                widget: "list"
                field: { label: "Bullet", name: "bullet", widget: "string" }

          # 芒聰聙芒聰聙 EDUCATION 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
          - label: "冒聼聨聯 Education"
            name: "education"
            widget: "list"
            fields:
              - { label: "Icon (emoji)", name: "icon",   widget: "string" }
              - { label: "Degree",       name: "degree", widget: "string" }
              - { label: "University",   name: "school", widget: "string" }

          # 芒聰聙芒聰聙 BLOG POSTS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
          - label: "冒聼聯聺 Featured Writing / Blog Posts"
            name: "posts"
            widget: "list"
            fields:
              - { label: "Post URL",   name: "url",     widget: "string" }
              - { label: "Tag Label (e.g. Investment Analysis)", name: "tag", widget: "string" }
              - { label: "Post Title", name: "title",   widget: "string" }
              - { label: "Short Excerpt (2芒聙聯3 sentences)", name: "excerpt", widget: "text" }
              - { label: "Date (e.g. October 2021)", name: "date", widget: "string" }
              - { label: "CTA card style? (tick for the last 'See All' card)", name: "cta", widget: "boolean", default: false }

          # 芒聰聙芒聰聙 CONTACT 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
          - label: "冒聼聯卢 Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email Address", name: "email",        widget: "string" }
              - { label: "LinkedIn URL",  name: "linkedin_url", widget: "string" }
              - { label: "Contact Section Description", name: "description", widget: "text" }
